<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITUAL ENGINE | V13.0 SECURE GATE</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; --warn: #ff4444; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:'Courier New', monospace; }
        .app-shell { display:flex; flex-direction:column; padding:15px; box-sizing:border-box; }
        
        /* MOBILE STACKING LOGIC */
        .grid { display:flex; flex-direction:column; gap:15px; }
        @media (min-width: 900px) { .grid { flex-direction:row; } }

        .pane { flex:1; background:var(--panel); border:1px solid #222; padding:15px; min-height:300px; display:flex; flex-direction:column; }
        .display { flex:1; background:#000; border:1px solid #111; padding:10px; overflow-y:auto; color:#fff; font-size:13px; margin-bottom:10px; }
        
        /* ELEMENTS */
        .ritual-input { width:100%; background:#111; color:#fff; border:1px solid #333; padding:12px; margin:8px 0; outline:none; box-sizing:border-box; }
        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:15px; font-weight:bold; cursor:pointer; letter-spacing:2px; margin-bottom:10px; }
        .btn-warn { background:var(--warn); }
        .header { display:flex; justify-content:space-between; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:15px; align-items:center; }
        #phoenix-layer { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; flex-direction:column; align-items:center; justify-content:center; }
        .phoenix-aura { width:200px; height:200px; border:2px solid var(--warn); box-shadow:0 0 40px var(--warn); border-radius:50%; animation:pulse 1s infinite alternate; background:url('https://files.oaiusercontent.com/file-m0PIn3C9mS6e8o4T2zH7Z0?se=2026-03-23T21%3A55%3A00Z&sp=r&sv=2024-08-04&sr=b&rscc=max-age%3D604800%2C%20immutable%2C%20private&rscd=attachment%3B%20filename%3Dmecha_phoenix.png&sig=S9R/uL/7tZ7bU5j4W4N5M5k7J8L9M0N1P2Q3R4S5T6U%3D') no-repeat center; background-size:contain; }
        @keyframes pulse { from { opacity:0.4; transform:scale(0.9); } to { opacity:1; transform:scale(1.1); } }
    </style>
</head>
<body>
<div id="phoenix-layer"><div class="phoenix-aura"></div><h1 style="color:var(--warn);">RITUAL ACTIVE</h1><div id="countdown" style="font-size:40px;">10</div></div>
<div class="app-shell">
    <div id="auth-view" style="max-width:400px; margin:auto; text-align:center;">
        <h2 id="gate-title">RITUAL ENGINE</h2>
        <div id="auth-inputs">
            <input type="text" id="primary-input" class="ritual-input" placeholder="ENTER ACCESS KEY">
            <button class="btn" id="gate-btn">INITIALIZE</button>
        </div>
        <p><a id="switch-mode" style="font-size:10px; color:#666; cursor:pointer;">USE CREDENTIALS</a></p>
    </div>

    <div id="arena-view" style="display:none;">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <div id="logo-box" style="width:40px; height:40px; border:1px solid var(--gold); margin-right:10px; background-size:cover;"></div>
                <div><h2 id="disp-name" style="margin:0; font-size:16px;"></h2><small id="disp-game"></small></div>
            </div>
            <div id="role-tag" style="border:1px solid var(--gold); padding:2px 5px; font-size:10px;"></div>
        </div>
        <div class="grid">
            <div class="pane"><small>HALL OF FAME</small><div id="hof-box" class="display"></div><div id="admin-tools"></div></div>
            <div class="pane"><small>ARENA CHAT</small><div id="chat-box" class="display">Connected.</div><input type="text" class="ritual-input" placeholder="Transmission..."><button class="btn">EXECUTE</button></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbyO11wai79oZ1ONs8cw0CRBozlVfpX8oiGZpSbDndmh-2MiZjHj_5cYcJ-l44xb8N1Y/exec";
    let isKeyMode = true;

    document.getElementById('switch-mode').addEventListener('click', () => {
        isKeyMode = !isKeyMode;
        document.getElementById('primary-input').placeholder = isKeyMode ? "ENTER ACCESS KEY" : "ENTER USERNAME";
        document.getElementById('gate-title').innerText = isKeyMode ? "RITUAL ENGINE" : "SECURE LOGIN";
        if(!isKeyMode) {
            const pw = document.createElement('input');
            pw.type = "password"; pw.id = "sec-input"; pw.className = "ritual-input"; pw.placeholder = "ENTER PASSWORD";
            document.getElementById('auth-inputs').insertBefore(pw, document.getElementById('gate-btn'));
        } else {
            const pw = document.getElementById('sec-input'); if(pw) pw.remove();
        }
    });

    document.getElementById('gate-btn').addEventListener('click', () => {
        const p1 = document.getElementById('primary-input').value;
        const p2 = document.getElementById('sec-input')?.value;
        let url = isKeyMode ? `${SCRIPT}?key=${p1}` : `${SCRIPT}?user=${p1}&pass=${p2}`;
        
        fetch(url).then(r => r.json()).then(data => {
            if(data.status === "UNAUTHORIZED" || data.status === "INVALID_CREDENTIALS") return alert("ACCESS DENIED");
            if(data.status === "REQUIRE_LOGIN") { isKeyMode = false; document.getElementById('switch-mode').click(); alert("ACCOUNT ACTIVE: LOGIN REQUIRED"); return; }
            
            window.USER = data;
            if(data.status === "STEP_BRANDING" || data.status === "STEP_ACCOUNT") { /* Show Setup Views... */ }
            else { launchArena(); }
        });
    });

    function launchArena() {
        document.getElementById('auth-view').style.display = 'none';
        document.getElementById('arena-view').style.display = 'block';
        document.getElementById('disp-name').innerText = USER.name;
        document.getElementById('disp-game').innerText = USER.game;
        document.getElementById('role-tag').innerText = USER.role;
        if(USER.logo) document.getElementById('logo-box').style.backgroundImage = `url('${USER.logo}')`;
        
        if(USER.role === "OWNER" || USER.role === "OFFICER") {
            const tools = document.getElementById('admin-tools');
            tools.innerHTML = `<button class="btn btn-warn" id="rit-btn">START RITUAL</button>`;
            document.getElementById('rit-btn').addEventListener('click', startRitual);
        }
    }

    function startRitual() {
        document.getElementById('phoenix-layer').style.display = 'flex';
        let c = 10;
        let t = setInterval(() => {
            c--; document.getElementById('countdown').innerText = c;
            if(c<=0) {
                clearInterval(t); document.getElementById('phoenix-layer').style.display = 'none';
                const w = prompt("WINNER:");
                if(w) fetch(`${SCRIPT}?key=${USER.key}&log_winner=${encodeURIComponent(w)}`).then(() => alert("LOGGED"));
            }
        }, 1000);
    }
</script>
</body>
</html>
