<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITUAL ENGINE | V13.7 COMMAND NODE</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; --warn: #ff4444; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:'Courier New', monospace; min-height:100vh; overflow-x:hidden; }
        .app-shell { display:flex; flex-direction:column; padding:15px; box-sizing:border-box; }
        
        /* RESPONSIVE MODULE STACKING */
        .grid { display:flex; flex-direction:column; gap:15px; }
        @media (min-width: 900px) { .grid { flex-direction:row; height: 80vh; } }

        .pane { flex:1; background:var(--panel); border:1px solid #222; padding:15px; display:flex; flex-direction:column; min-height:300px; }
        .display { flex:1; background:#000; border:1px solid #111; padding:12px; overflow-y:auto; color:#fff; font-size:13px; margin-bottom:10px; }
        
        .ritual-input { width:100%; background:#111; color:#fff; border:1px solid #333; padding:12px; margin:8px 0; outline:none; box-sizing:border-box; }
        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:15px; font-weight:bold; cursor:pointer; letter-spacing:2px; margin-bottom:10px; text-transform:uppercase; }
        .btn-sub { background:#222; color:var(--gold); font-size:11px; }
        .btn-warn { background:var(--warn); color:#000; }
        
        .header { display:flex; justify-content:space-between; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:15px; align-items:center; }
    </style>
</head>
<body>
<div class="app-shell">
    <div id="auth-view" style="max-width:400px; margin:auto; text-align:center;">
        <h2 style="letter-spacing: 5px; margin-bottom: 20px;">RITUAL ENGINE</h2>
        <div id="gate-container">
            <button class="btn" onclick="showKeyInput()">CLAIM ACCESS NODE</button>
            <button class="btn btn-sub" onclick="showCredsInput()">INITIALIZE SESSION</button>
        </div>
        <div id="dynamic-inputs" style="display:none; margin-top:20px;"></div>
    </div>

    <div id="arena-view" style="display:none;">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <div id="logo-box" style="width:40px; height:40px; border:1px solid var(--gold); margin-right:10px; background-size:cover; background-color:#111;"></div>
                <div><h2 id="disp-name" style="margin:0; font-size:16px;"></h2><small id="disp-game"></small></div>
            </div>
            <div id="role-tag" style="border:1px solid var(--gold); padding:2px 6px; font-size:10px;"></div>
        </div>
        <div class="grid">
            <div class="pane"><small>🏆 HALL OF FAME</small><div id="hof-box" class="display"></div><div id="admin-tools"></div></div>
            <div class="pane"><small>🔥 ARENA CHAT</small><div id="chat-box" class="display">Connected.</div><input type="text" class="ritual-input" placeholder="Transmission..."><button class="btn">EXECUTE</button></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbzW_Lv26Kin4IF0ULECMn2h4UQQooNX03wrLtLNqbqbHVX5U-4_SjUuvKeWEXb_4aLv/exec";
    let CURRENT_KEY = "";

    function showKeyInput() {
        const div = document.getElementById('dynamic-inputs');
        document.getElementById('gate-container').style.display = 'none';
        div.style.display = 'block';
        div.innerHTML = `<h3>VERIFY NODE KEY</h3><input type="text" id="k-in" class="ritual-input" placeholder="ACCESS KEY"><button class="btn" onclick="validateKey()">VERIFY</button><p><a onclick="location.reload()" style="font-size:10px; color:#666; cursor:pointer;">BACK</a></p>`;
    }

    function showCredsInput() {
        const div = document.getElementById('dynamic-inputs');
        document.getElementById('gate-container').style.display = 'none';
        div.style.display = 'block';
        div.innerHTML = `<h3>SECURE LOGIN</h3><input type="text" id="u-in" class="ritual-input" placeholder="USERNAME"><input type="password" id="p-in" class="ritual-input" placeholder="PASSWORD"><button class="btn" onclick="loginWithCreds()">CONNECT</button><p><a onclick="location.reload()" style="font-size:10px; color:#666; cursor:pointer;">BACK</a></p>`;
    }

    function validateKey() {
        const key = document.getElementById('k-in').value;
        fetch(`${SCRIPT}?key=${key}`).then(r => r.json()).then(data => {
            if(data.status === "UNAUTHORIZED") return alert("INVALID KEY");
            CURRENT_KEY = key;
            if(data.status === "REQUIRE_LOGIN") { alert("NODE CLAIMED. USE LOGIN."); location.reload(); }
            else if(data.status === "STEP_BRANDING") showBrandingForm();
            else if(data.status === "STEP_ACCOUNT") showAccountForm(data.role);
        });
    }

    function showBrandingForm() {
        const div = document.getElementById('dynamic-inputs');
        div.innerHTML = `<h3>IDENTITY SETUP</h3><input type="text" id="b-name" class="ritual-input" placeholder="ALLIANCE NAME"><input type="text" id="b-game" class="ritual-input" placeholder="ACTIVE GAME"><input type="text" id="b-tag" class="ritual-input" placeholder="TAG (e.g. TCA1)"><input type="text" id="b-logo" class="ritual-input" placeholder="LOGO URL"><button class="btn" onclick="saveBranding()">LOCK BRANDING</button>`;
    }

    function saveBranding() {
        const name = encodeURIComponent(document.getElementById('b-name').value);
        const game = encodeURIComponent(document.getElementById('b-game').value);
        const tag = encodeURIComponent(document.getElementById('b-tag').value);
        const logo = encodeURIComponent(document.getElementById('b-logo').value);
        fetch(`${SCRIPT}?key=${CURRENT_KEY}&name=${name}&game=${game}&tag=${tag}&logo=${logo}`).then(() => validateKey());
    }

    function showAccountForm(role) {
        const div = document.getElementById('dynamic-inputs');
        div.innerHTML = `<h3>ACTIVATE ${role} NODE</h3><input type="text" id="u-reg" class="ritual-input" placeholder="USERNAME"><input type="password" id="p-reg" class="ritual-input" placeholder="PASSWORD"><button class="btn" onclick="saveAccount()">INITIALIZE ACCOUNT</button>`;
    }

    function saveAccount() {
        const u = document.getElementById('u-reg').value;
        const p = document.getElementById('p-reg').value;
        fetch(`${SCRIPT}?key=${CURRENT_KEY}&username=${u}&password=${p}`).then(res => res.text()).then(res => {
            if(res === "TAKEN") return alert("USERNAME TAKEN");
            alert("ACCOUNT SECURED."); location.reload();
        });
    }

    function loginWithCreds() {
        const u = document.getElementById('u-in').value;
        const p = document.getElementById('p-in').value;
        fetch(`${SCRIPT}?user=${u}&pass=${p}`).then(r => r.json()).then(data => {
            if(data.status === "INVALID_CREDENTIALS") return alert("DENIED");
            window.USER = data;
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('arena-view').style.display = 'block';
            document.getElementById('disp-name').innerText = USER.name;
            document.getElementById('disp-game').innerText = USER.game;
            document.getElementById('role-tag').innerText = USER.role;
            if(USER.logo) document.getElementById('logo-box').style.backgroundImage = `url('${USER.logo}')`;
            if(USER.role === "OWNER" || USER.role === "OFFICER") {
                document.getElementById('admin-tools').innerHTML = `<button class="btn btn-warn" onclick="alert('RITUAL INITIATED')">START RITUAL</button>`;
            }
        });
    }
</script>
</body>
</html>
