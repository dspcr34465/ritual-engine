<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RITUAL ENGINE | V20.2 ADMIN</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; --warn: #ff4444; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:monospace; }
        .app-shell { padding:15px; text-align:center; max-width:600px; margin:auto; }
        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:16px; font-weight:bold; cursor:pointer; margin-bottom:10px; font-size:13px; text-transform:uppercase; }
        .btn-sub { background:#1a1a1a; color:var(--gold); border:1px solid #333; padding:12px; font-size:11px; }
        .btn-warn { background:var(--warn); color:#000; margin-top:10px; }
        .in { width:100%; background:#111; color:#fff; border:1px solid #333; padding:15px; margin:10px 0; box-sizing:border-box; }
        #chat { height:300px; background:#050505; border:1px solid #222; overflow-y:auto; text-align:left; padding:12px; margin-top:15px; font-size:13px; color:#eee; }
        .header { border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; }
        #admin-panel { margin-top:20px; padding:15px; border:2px solid var(--gold); background:#0a0a0a; display:none; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="auth">
        <h2 style="letter-spacing:4px;">RITUAL ENGINE</h2>
        <div id="status" style="color:var(--warn); font-size:11px; margin-bottom:10px;"></div>
        <div id="inputs">
            <button class="btn" onclick="showLogin()">INITIALIZE SESSION</button>
        </div>
    </div>

    <div id="arena" style="display:none;">
        <div class="header">
            <div style="text-align:left;">
                <h3 id="u-name" style="margin:0;"></h3>
                <small id="u-role-debug" style="color:#666;"></small>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:#444; font-size:10px;">LOGOUT</button>
        </div>
        
        <div id="chat">Connecting...</div>
        <input type="text" id="msg" class="in" placeholder="Transmission...">
        <button class="btn" onclick="send()">EXECUTE</button>

        <div id="admin-panel">
            <b style="color:var(--gold); letter-spacing:2px;">COMMAND CENTER</b>
            <div id="admin-buttons" style="margin-top:10px;"></div>
        </div>
    </div>
</div>

<script>
    var b1 = "https://script.google.com/macros/s/";
    var b2 = "AKfycbxjcRYytKaTjRwixtYkce-_wZin97vE_k7eLXrV5a_GbTl7AcUBd-NFtpDfNSgrkkuD";
    var b3 = "/exec";
    var SCRIPT = b1 + b2 + b3;
    var USER = null;

    function showLogin() {
        document.getElementById("inputs").innerHTML = 
            '<input id="user" class="in" placeholder="USER"><input id="pass" class="in" type="password" placeholder="PASS"><button class="btn" onclick="connect()">CONNECT</button>';
    }

    function connect() {
        var u = document.getElementById("user").value.trim();
        var p = document.getElementById("pass").value.trim();
        fetch(SCRIPT + "?user=" + encodeURIComponent(u) + "&pass=" + encodeURIComponent(p))
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if(data.status === "AUTHORIZED") {
                USER = data;
                localStorage.setItem("ritual_user", JSON.stringify(data));
                sessionStorage.setItem("active_session", "true");
                launchArena();
            } else { document.getElementById("status").innerText = "ACCESS DENIED"; }
        });
    }

    function launchArena() {
        document.getElementById("auth").style.display = "none";
        document.getElementById("arena").style.display = "block";
        document.getElementById("u-name").innerText = USER.name;
        
        // DEBUG: Tell us what the sheet actually says
        var rawRole = USER.role ? USER.role.toUpperCase().trim() : "NONE";
        document.getElementById("u-role-debug").innerText = "ROLE DETECTED: " + rawRole;

        // BRUTEFORCE CHECK
        if (rawRole === "OWNER" || rawRole === "OFFICER") {
            document.getElementById("admin-panel").style.display = "block";
            var btns = '<button class="btn btn-sub" onclick="copyInvite(\'MEMBER\')">INVITE MEMBER</button>';
            if (rawRole === "OWNER") {
                btns += '<button class="btn btn-sub" onclick="copyInvite(\'OFFICER\')">INVITE OFFICER</button>';
            }
            btns += '<button class="btn btn-warn" onclick="alert(\'RITUAL ENGAGED\')">START RITUAL</button>';
            document.getElementById("admin-buttons").innerHTML = btns;
        }

        sync();
        setInterval(sync, 8000);
    }

    function sync() {
        if(!USER) return;
        fetch(SCRIPT + "?get_gist=true&key=" + USER.key)
        .then(function(r) { return r.json(); })
        .then(function(g) {
            var c = g.chat || [];
            document.getElementById("chat").innerHTML = c.map(function(m) {
                return "<div><b>" + m.user + ":</b> " + m.text + "</div>";
            }).join("");
            var b = document.getElementById("chat"); b.scrollTop = b.scrollHeight;
        });
    }

    function send() {
        var m = document.getElementById("msg").value;
        if(!m) return;
        fetch(SCRIPT + "?key=" + USER.key + "&chat_msg=" + encodeURIComponent(m)).then(function() {
            document.getElementById("msg").value = ""; sync();
        });
    }

    function copyInvite(t) { alert("Invite Copied: " + t); }
    function logout() { localStorage.clear(); sessionStorage.clear(); location.reload(); }

    window.onload = function() {
        var saved = localStorage.getItem("ritual_user");
        if(saved && sessionStorage.getItem("active_session")) {
            USER = JSON.parse(saved);
            launchArena();
        }
    };
</script>
</body>
</html>
