<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RITUAL ENGINE | V23.5 SAAS</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; --warn: #ff4444; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:'Courier New', monospace; min-height:100vh; overflow-x:hidden; }
        .app-shell { padding:15px; max-width:800px; margin:auto; }
        .pane { background:var(--panel); border:1px solid #222; padding:15px; margin-bottom:15px; }
        .display { height:180px; background:#000; border:1px solid #111; overflow-y:auto; padding:10px; color:#eee; font-size:12px; margin-bottom:10px; line-height:1.6; }
        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:15px; font-weight:bold; cursor:pointer; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
        .btn-sub { background:#1a1a1a; color:var(--gold); border:1px solid #333; padding:12px; font-size:11px; }
        .in { width:100%; background:#111; color:#fff; border:1px solid #333; padding:15px; margin:10px 0; box-sizing:border-box; }
        .admin-section { border:2px dashed var(--gold); padding:15px; margin-top:20px; display:none; }
        #logo-header { width:50px; height:50px; border:1px solid var(--gold); background-size:cover; background-position:center; margin-right:15px; background-color:#111; }
        .header-flex { display:flex; align-items:center; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:20px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="auth-view" style="text-align:center; padding-top:50px;">
        <h2 style="letter-spacing:5px;">RITUAL ENGINE</h2>
        <div id="status-hud" style="color:var(--warn); font-size:11px; margin-bottom:10px;"></div>
        <div id="login-form">
            <input id="u" class="in" placeholder="USERNAME" autocapitalize="none">
            <input id="p" class="in" type="password" placeholder="PASSWORD">
            <button class="btn" onclick="login()">INITIALIZE TERMINAL</button>
        </div>
    </div>

    <div id="arena-view" style="display:none;">
        <div class="header-flex">
            <div id="logo-header"></div>
            <div style="flex:1;">
                <h2 id="alliance-name" style="margin:0; font-size:18px;"></h2>
                <small id="user-role" style="color:#666;"></small>
            </div>
            <button onclick="logout()" style="background:none; border:none; color:#444; cursor:pointer;">DISCONNECT</button>
        </div>

        <div class="pane">
            <small>🏆 HALL OF FAME</small>
            <div id="hof-box" class="display">Syncing Records...</div>
        </div>

        <div class="pane">
            <small>🔥 ARENA CHAT</small>
            <div id="chat-box" class="display">Connecting...</div>
            <input id="msg-in" class="in" placeholder="Transmission..." onkeydown="if(event.key==='Enter') sendChat()">
            <button class="btn" onclick="sendChat()">EXECUTE</button>
        </div>

        <div id="command-center" class="admin-section">
            <b style="color:var(--gold); display:block; margin-bottom:15px;">COMMAND CENTER</b>
            
            <div id="branding-tools" style="display:none;">
                <small>PORTAL BRANDING</small>
                <input id="brand-name" class="in" placeholder="ALLIANCE NAME">
                <input id="brand-logo" class="in" placeholder="LOGO IMAGE URL">
                <button class="btn btn-sub" onclick="updateBranding()">SAVE BRANDING</button>
                <hr style="border:0; border-top:1px solid #333; margin:15px 0;">
            </div>

            <small>RAFFLE OPERATIONS</small>
            <input type="file" id="csv-file" accept=".csv" style="display:none;" onchange="handleRaffle(this)">
            <button class="btn" style="background:#ff4444; color:#000;" onclick="document.getElementById('csv-file').click()">UPLOAD RAFFLE CSV</button>
            
            <button class="btn btn-sub" onclick="generateInvite('MEMBER')">INVITE MEMBER</button>
            <button id="officer-invite-btn" class="btn btn-sub" onclick="generateInvite('OFFICER')" style="display:none;">INVITE OFFICER</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbwH-NpU1DCE7JESuMhb2Sg3EBDZc9XoRB7Zj9vKVrr_AECC6OTrLpj7-tdvqMkqBJUZ/exec";
    let USER = null;

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const hud = document.getElementById('status-hud');
        if(!u || !p) return;

        hud.innerText = "LINKING...";
        const r = await fetch(`${SCRIPT}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
        const data = await r.json();

        if(data.status === "AUTHORIZED") {
            USER = data;
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('arena-view').style.display = 'block';
            renderUI();
            sync();
            setInterval(sync, 8000);
        } else { hud.innerText = "DENIED: " + data.status; }
    }

    function renderUI() {
        document.getElementById('alliance-name').innerText = USER.alliance;
        document.getElementById('user-role').innerText = USER.role;
        if(USER.logo) document.getElementById('logo-header').style.backgroundImage = `url('${USER.logo}')`;

        if(USER.role === "OWNER" || USER.role === "OFFICER") {
            document.getElementById('command-center').style.display = 'block';
            if(USER.role === "OWNER") {
                document.getElementById('branding-tools').style.display = 'block';
                document.getElementById('officer-invite-btn').style.display = 'block';
            }
        }
    }

    async function sync() {
        if(!USER) return;
        const r = await fetch(`${SCRIPT}?get_sync=true&key=${USER.key}`);
        const g = await r.json();
        document.getElementById('chat-box').innerHTML = (g.chat || []).map(m => `<div><b>${m.user}:</b> ${m.text}</div>`).join('');
        document.getElementById('hof-box').innerHTML = (g.history || []).map(h => `<div>[${h.date}] ${h.name}</div>`).join('') || "No Records.";
        const c = document.getElementById('chat-box'); c.scrollTop = c.scrollHeight;
    }

    async function sendChat() {
        const m = document.getElementById('msg-in').value.trim();
        if(!m) return;
        await fetch(`${SCRIPT}?key=${USER.key}&chat_msg=${encodeURIComponent(m)}`);
        document.getElementById('msg-in').value = '';
        sync();
    }

    async function updateBranding() {
        const n = document.getElementById('brand-name').value;
        const l = document.getElementById('brand-logo').value;
        await fetch(`${SCRIPT}?update_branding=true&key=${USER.key}&new_name=${encodeURIComponent(n)}&new_logo=${encodeURIComponent(l)}`);
        alert("Branding Saved. Refreshing Terminal...");
        location.reload();
    }

    function handleRaffle(input) {
        const file = input.files[0];
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let hat = [];
            lines.forEach(line => {
                const [name, entries] = line.split(',');
                if(name && entries) {
                    for(let i=0; i<parseInt(entries); i++) hat.push(name.trim());
                }
            });
            if(hat.length > 0) {
                const winner = hat[Math.floor(Math.random() * hat.length)];
                if(confirm("WINNER DRAWN: " + winner + "\nLog to Hall of Fame?")) {
                    fetch(`${SCRIPT}?key=${USER.key}&log_winner=${encodeURIComponent(winner)}`).then(sync);
                }
            }
        };
        reader.readAsText(file);
    }

    function generateInvite(role) {
        alert("GENERATING " + role + " INVITE KEY...");
        fetch(`${SCRIPT}?creator_key=${USER.key}&invite_role=${role}`)
            .then(r => r.json()).then(data => {
                prompt("COPY THIS KEY FOR YOUR RECRUIT:", data.key);
            });
    }

    function logout() { localStorage.clear(); location.reload(); }
</script>
</body>
</html>
