<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RITUAL ENGINE | V24.0 PHOENIX</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; --warn: #ff4444; --fire: #ff6600; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:'Courier New', monospace; min-height:100vh; overflow-x:hidden; }
        .app-shell { padding:15px; max-width:800px; margin:auto; }
        .pane { background:var(--panel); border:1px solid #222; padding:15px; margin-bottom:15px; }
        .display { height:180px; background:#000; border:1px solid #111; overflow-y:auto; padding:10px; color:#eee; font-size:12px; margin-bottom:10px; line-height:1.6; }
        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:15px; font-weight:bold; cursor:pointer; margin-bottom:10px; text-transform:uppercase; letter-spacing:1px; }
        .in { width:100%; background:#111; color:#fff; border:1px solid #333; padding:15px; margin:10px 0; box-sizing:border-box; }
        .admin-section { border:2px dashed var(--gold); padding:15px; margin-top:20px; display:none; }
        .ritual-text { color: var(--fire); text-align: center; font-weight: bold; font-size: 18px; animation: flicker 0.2s infinite; }
        @keyframes flicker { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .countdown { font-size: 50px; color: var(--gold); display: block; text-shadow: 0 0 10px var(--fire); }
        #logo-header { width:50px; height:50px; border:1px solid var(--gold); background-size:cover; margin-right:15px; }
    </style>
</head>
<body>

<div class="app-shell">
    <div id="auth-view" style="text-align:center; padding-top:50px;">
        <h2 style="letter-spacing:5px;">RITUAL ENGINE</h2>
        <div id="status-hud" style="color:var(--warn); font-size:11px; margin-bottom:10px;">SYSTEM STANDBY</div>
        <input id="u" class="in" placeholder="USERNAME">
        <input id="p" class="in" type="password" placeholder="PASSWORD">
        <button class="btn" onclick="login()">INITIALIZE TERMINAL</button>
    </div>

    <div id="arena-view" style="display:none;">
        <div style="display:flex; align-items:center; border-bottom:1px solid var(--gold); padding-bottom:10px; margin-bottom:20px;">
            <div id="logo-header"></div>
            <div style="flex:1;"><h2 id="alliance-name" style="margin:0; font-size:18px;"></h2><small id="user-role"></small></div>
            <button onclick="location.reload()" style="background:none; border:none; color:#444;">LOGOUT</button>
        </div>

        <div class="pane"><small>🏆 HALL OF FAME</small><div id="hof-box" class="display"></div></div>
        <div class="pane"><small>🔥 ARENA CHAT</small><div id="chat-box" class="display"></div><input id="msg-in" class="in" placeholder="Transmission..."><button class="btn" onclick="sendChat()">EXECUTE</button></div>

        <div id="command-center" class="admin-section">
            <b style="color:var(--gold);">COMMAND CENTER</b>
            <input type="file" id="raffle-file" accept=".csv, .xlsx, .xls" style="display:none;" onchange="handleRaffle(this)">
            <button class="btn" style="background:var(--warn); color:#000; margin-top:10px;" onclick="document.getElementById('raffle-file').click()">FEED THE PHOENIX (START RITUAL)</button>
            <button class="btn" onclick="generateInvite('MEMBER')" style="background:#1a1a1a; color:var(--gold); border:1px solid #333;">INVITE MEMBER</button>
            <button id="officer-btn" class="btn" onclick="generateInvite('OFFICER')" style="display:none; background:#1a1a1a; color:var(--gold); border:1px solid #333;">INVITE OFFICER</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbxB96DtgNvjM44PjjnlAPvBVmonoQMBKPByxloC90cR7VLm2-B8MDeYtrNzcUbl1xFO/exec";
    let USER = null; let RITUAL_ON = false;

    async function login() {
        const u = document.getElementById('u').value.trim(); const p = document.getElementById('p').value.trim();
        const r = await fetch(`${SCRIPT}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
        const data = await r.json();
        if(data.status === "AUTHORIZED") {
            USER = data; document.getElementById('auth-view').style.display = 'none'; document.getElementById('arena-view').style.display = 'block';
            document.getElementById('alliance-name').innerText = USER.alliance; document.getElementById('user-role').innerText = USER.role;
            if(USER.role === "OWNER" || USER.role === "OFFICER") {
                document.getElementById('command-center').style.display = 'block';
                if(USER.role === "OWNER") document.getElementById('officer-btn').style.display = 'block';
            }
            sync(); setInterval(sync, 8000);
        }
    }

    async function sync() {
        if(!USER || RITUAL_ON) return;
        const r = await fetch(`${SCRIPT}?get_sync=true&key=${USER.key}`);
        const g = await r.json();
        document.getElementById('chat-box').innerHTML = (g.chat || []).map(m => `<div><b>${m.user}:</b> ${m.text}</div>`).join('');
        document.getElementById('hof-box').innerHTML = (g.history || []).map(h => `<div>[${h.date}] ${h.name}</div>`).join('');
    }

    function handleRaffle(input) {
        const file = input.files[0]; const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
            let hat = [];
            rows.forEach(row => { if(row[0] && row[1]) for(let i=0; i<parseInt(row[1]); i++) hat.push(row[0].toString().trim()); });
            if(hat.length > 0) runPhoenix(hat);
        };
        reader.readAsArrayBuffer(file);
    }

    function runPhoenix(hat) {
        RITUAL_ON = true; const hof = document.getElementById('hof-box');
        hof.innerHTML = "<div class='ritual-text'><br>THE PHOENIX HAS BEEN FED...</div>";
        setTimeout(() => {
            hof.innerHTML = "<div class='ritual-text'><br>LET THE FLAMES DECIDE</div>";
            setTimeout(() => {
                let timer = 10;
                const loop = setInterval(() => {
                    const shuffleName = hat[Math.floor(Math.random() * hat.length)];
                    hof.innerHTML = `<div style='text-align:center;'><br><span style='color:#444'>${shuffleName}</span><br><span class='countdown'>${timer}</span></div>`;
                    timer--;
                    if(timer < 0) {
                        clearInterval(loop);
                        const winner = hat[Math.floor(Math.random() * hat.length)];
                        hof.innerHTML = `<div class='ritual-text' style='color:var(--gold)'><br>RITUAL COMPLETE<br><br><span style='font-size:22px'>${winner}</span><br>IS CHOSEN</div>`;
                        fetch(`${SCRIPT}?key=${USER.key}&log_winner=${encodeURIComponent(winner)}`).then(() => {
                            setTimeout(() => { RITUAL_ON = false; sync(); }, 5000);
                        });
                    }
                }, 1000);
            }, 2000);
        }, 2000);
    }

    function generateInvite(role) {
        const hud = document.getElementById('status-hud');
        hud.innerText = "LINK NOT COPIED. STAND BY...";
        fetch(`${SCRIPT}?creator_key=${USER.key}&invite_role=${role}`)
            .then(r => r.json()).then(data => {
                if(data.status === "SUCCESS") {
                    prompt("MANUAL COPY REQUIRED. COPY KEY FOR " + role + ":", data.key);
                    hud.innerText = "KEY READY.";
                }
            });
    }

    async function sendChat() {
        const m = document.getElementById('msg-in').value; if(!m) return;
        await fetch(`${SCRIPT}?key=${USER.key}&chat_msg=${encodeURIComponent(m)}`);
        document.getElementById('msg-in').value = ''; sync();
    }
</script>
</body>
</html>
