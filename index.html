<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITUAL ENGINE V22.0</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        body { background:#000; color:var(--gold); font-family:monospace; padding:15px; margin:0; }
        .pane { background:#0a0a0a; border:1px solid #222; padding:15px; margin-bottom:15px; }
        .display { height:180px; background:#000; border:1px solid #111; overflow-y:auto; padding:10px; color:#eee; font-size:12px; margin-bottom:10px; }
        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:15px; font-weight:bold; cursor:pointer; margin-bottom:10px; text-transform:uppercase; }
        .in { width:100%; background:#111; color:#fff; border:1px solid #333; padding:15px; margin:10px 0; box-sizing:border-box; }
        .admin-box { border: 2px dashed var(--gold); padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>

<div id="auth-view" style="text-align:center; padding-top:50px;">
    <h2>RITUAL ENGINE</h2>
    <input id="u" class="in" placeholder="USERNAME">
    <input id="p" class="in" type="password" placeholder="PASSWORD">
    <button class="btn" onclick="login()">INITIALIZE SESSION</button>
</div>

<div id="arena-view" style="display:none;">
    <h3 id="disp-name"></h3>
    <div class="pane">
        <small>🏆 ALLIANCE RECORDS (HOF)</small>
        <div id="hof-box" class="display">Loading...</div>
    </div>
    <div class="pane">
        <small>🔥 ARENA CHAT</small>
        <div id="chat-box" class="display">Connecting...</div>
        <input id="msg" class="in" placeholder="Message...">
        <button class="btn" onclick="send()">EXECUTE</button>
    </div>
    <div id="admin-panel" class="admin-box" style="display:none;">
        <small>COMMAND CENTER</small>
        <div id="admin-tools"></div>
    </div>
</div>

<script>
    const SCRIPT = "c";
    let USER = null;https://script.google.com/macros/s/AKfycbyUBvVi2x6fhIooLFWO41I00n5XBZfZlHnysmymytTHKYSTRNm3FnnWW1OlxbF0aK2I/exec

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        try {
            const r = await fetch(`${SCRIPT}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
            const data = await r.json();
            if(data.status === "AUTHORIZED") {
                USER = data;
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('arena-view').style.display = 'block';
                document.getElementById('disp-name').innerText = USER.name;
                if(USER.role === "OWNER" || USER.role === "OFFICER") {
                    document.getElementById('admin-panel').style.display = 'block';
                    document.getElementById('admin-tools').innerHTML = `
                        <button class="btn" onclick="alert('INVITE COPIED')">INVITE MEMBER</button>
                        <button class="btn" style="background:#ff4444" onclick="startRitual()">START RITUAL</button>`;
                }
                sync();
                setInterval(sync, 7000);
            } else { alert("DENIED"); }
        } catch(e) { alert("CONNECTION ERROR - CHECK SCRIPT DEPLOYMENT"); }
    }

    async function sync() {
        const r = await fetch(`${SCRIPT}?get_sync=true&key=${USER.key}`);
        const g = await r.json();
        document.getElementById('chat-box').innerHTML = (g.chat || []).map(m => `<div><b>${m.user}:</b> ${m.text}</div>`).join('');
        document.getElementById('hof-box').innerHTML = (g.history || []).map(i => `<div>[${i.date}] ${i.name}</div>`).join('') || "No Records.";
    }

    async function send() {
        const m = document.getElementById('msg').value;
        await fetch(`${SCRIPT}?key=${USER.key}&chat_msg=${encodeURIComponent(m)}`);
        document.getElementById('msg').value = '';
        sync();
    }

    function startRitual() {
        const win = prompt("WINNER NAME:");
        if(win) fetch(`${SCRIPT}?key=${USER.key}&log_winner=${encodeURIComponent(win)}`).then(() => sync());
    }
</script>
</body>
</html>
