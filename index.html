<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITUAL | V33.86</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; }
        body { background: #000; color: var(--gold); font-family: monospace; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .card { background: #0a0a0a; border: 1px solid #222; padding: 40px; text-align: center; width: 90%; max-width: 400px; border-radius: 10px; }
        input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 15px; margin: 10px 0; box-sizing: border-box; text-align: center; }
        button { width: 100%; background: var(--gold); border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #arena { display: none; padding: 20px; text-align: center; width: 100%; }
    </style>
</head>
<body>
    <div id="auth" class="card">
        <h1>RITUAL</h1>
        <input id="u" placeholder="IDENTITY">
        <input id="p" type="password" placeholder="PASSKEY">
        <button onclick="login()">INITIALIZE</button>
        <p id="hud" style="font-size: 10px; color: #444;">[ STANDBY ]</p>
    </div>

    <div id="arena">
        <h2 id="name">COMMANDER</h2>
        <div id="chat" style="background:#0a0a0a; border:1px solid #1a1a1a; height: 300px; overflow-y: auto; padding: 10px; margin-top: 20px;">LINKING...</div>
        <button onclick="location.reload()" style="background:#111; color:#444; margin-top: 20px;">DISCONNECT</button>
    </div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbzTZxUlY3ncFyk6jvObJWPplUHIEeNrlvjXSncR1v-LOPoWpMTQ-5COIBU2tT9MMmBX/exec";
    let USER = null;

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        document.getElementById('hud').innerText = "[ BUSY ]";
        try {
            const res = await fetch(`${SCRIPT}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`, { mode: 'cors', credentials: 'omit' });
            const d = await res.json();
            if(d.status === "AUTHORIZED") {
                USER = d;
                document.getElementById('auth').style.display = 'none';
                document.getElementById('arena').style.display = 'block';
                document.getElementById('name').innerText = USER.user.toUpperCase();
                setInterval(sync, 8000);
                sync();
            } else { document.getElementById('hud').innerText = "[ DENIED ]"; }
        } catch(e) { document.getElementById('hud').innerText = "[ ERR ]"; }
    }

    async function sync() {
        if(!USER) return;
        try {
            const res = await fetch(`${SCRIPT}?get_sync=true&key=${USER.key}`, { mode: 'cors', credentials: 'omit' });
            const d = await res.json();
            if(d.history) {
                document.getElementById('chat').innerHTML = d.history.map(h => `<p style="border-bottom:1px solid #111; padding:5px;"><b>${h.name}</b>: Signal Established.</p>`).join('');
            }
        } catch(e) {}
    }
</script>
</body>
</html>
