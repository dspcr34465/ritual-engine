<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RITUAL | V31.7</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:'Courier New', monospace; height:100vh; overflow:hidden; }
        
        /* HARD-STATE ISOLATION */
        .screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index: 100; display: none; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .screen.active { display: flex !important; flex-direction: column; align-items: center; }
        #auth-view { justify-content: center; z-index: 1000; }

        .terminal-box { width: 100%; max-width: 350px; text-align: center; border: 1px solid #111; padding: 30px; background: var(--panel); }
        .arena-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        
        /* COMPONENTS */
        .pane { background:var(--panel); border:1px solid #222; padding:15px; width: 100%; box-sizing: border-box; }
        .seal-module { width: 100%; aspect-ratio: 1/1; border: 1px solid var(--gold); background-size: cover; background-position: center; display: flex; align-items: flex-end; }
        .seal-banner { width: 100%; background: rgba(0,0,0,0.85); padding: 12px; text-align: center; border-top: 1px solid var(--gold); }
        .av-circle { width: 60px; height: 60px; border: 1px solid var(--gold); border-radius: 50%; background-size: cover; background-position: center; background-color: #111; display: flex; align-items: center; justify-content: center; }
        .av-circle:empty::before { content: "+"; font-size: 20px; opacity: 0.4; }

        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:16px; font-weight:bold; cursor:pointer; text-transform:uppercase; margin-top: 10px; }
        .in { width:100%; background:#000; color:#fff; border:1px solid #333; padding:16px; margin:10px 0; box-sizing:border-box; text-align:center; }
        
        /* FOCUS SYSTEM */
        .focus-layer { position: fixed; top:0; left:0; width:100vw; height:100vh; z-index: 2000; background: #000; padding: 20px; box-sizing: border-box; display: none; flex-direction: column; }
        .focus-layer.active { display: flex; }
    </style>
</head>
<body>

    <div id="auth-view" class="screen active">
        <div class="terminal-box">
            <h1 style="letter-spacing:10px;">RITUAL</h1>
            <small id="hud">[ SYSTEM: STANDBY ]</small>
            <input id="u" class="in" placeholder="IDENTITY" autocapitalize="none">
            <input id="p" class="in" type="password" placeholder="PASSKEY">
            <button class="btn" onclick="login()">INITIALIZE</button>
        </div>
    </div>

    <div id="arena-view" class="screen">
        <div class="arena-container">
            <div id="seal-box" class="seal-module"><div class="seal-banner"><h2 id="all-n"></h2><small id="u-r" style="letter-spacing:3px;"></small></div></div>
            <div class="pane" onclick="focusModule('VAULT')">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div id="my-av" class="av-circle"></div>
                    <div style="flex:1;"><div id="my-name" style="font-weight:bold; color:#fff;"></div><div id="my-bio" style="font-size:10px; color:#666;"></div></div>
                </div>
            </div>
            <div class="pane" onclick="focusModule('CHAT')"><small>🔥 CHAT</small><div id="chat-pre" style="height:60px; overflow:hidden; font-size:11px;"></div></div>
            <div id="cmd" class="pane" style="display:none; border:1px solid #ff444433;">
                <button class="btn" onclick="document.getElementById('logo-up').click()">BRAND SEAL</button>
                <input type="file" id="logo-up" accept="image/*" style="display:none" onchange="procLogo(this)">
                <button class="btn" onclick="location.reload()" style="background:none; color:#444;">OFFLINE</button>
            </div>
        </div>
    </div>

    <div id="focus-layer" class="focus-layer">
        <button onclick="exitFocus()" style="color:var(--gold); background:none; border:none; margin-bottom:20px;">← BACK</button>
        <div id="focus-body" style="flex:1;"></div>
    </div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbyWVNoAtfS0cJBHyfH1R-HKuxjMLdPl9C0WXJmSo6Woaz42xWwTtpSwxECjgeBFksEP/exec";
    let USER = null;

    // THE CORS KILLER ENGINE
    function apiCall(params) {
        const old = document.getElementById('ritual-api'); if(old) old.remove();
        const s = document.createElement('script');
        s.id = 'ritual-api';
        s.src = `${SCRIPT}?${params}&cb=${Date.now()}`;
        document.body.appendChild(s);
    }

    function handleResponse(d) {
        if(d.status === "AUTHORIZED") {
            USER = d; renderArena();
        } else if (d.chat || d.history) {
            updateArenaData(d);
        } else if (d.status === "SUCCESS") {
            console.log("Vault Updated");
        } else if (d.status === "DENIED") {
            document.getElementById('hud').innerText = "[ ACCESS DENIED ]";
        }
    }

    function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        document.getElementById('hud').innerText = "[ CONNECTING... ]";
        apiCall(`user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`);
    }

    function renderArena() {
        document.getElementById('auth-view').classList.remove('active');
        document.getElementById('arena-view').classList.add('active');
        document.getElementById('all-n').innerText = USER.alliance;
        document.getElementById('u-r').innerText = USER.role;
        document.getElementById('my-name').innerText = USER.user.toUpperCase();
        document.getElementById('my-bio').innerText = USER.bio;
        if(USER.logo) document.getElementById('seal-box').style.backgroundImage = `url('${USER.logo}')`;
        if(USER.av) document.getElementById('my-av').style.backgroundImage = `url('${USER.av}')`;
        if(USER.role !== "MEMBER") document.getElementById('cmd').style.display='block';
        setInterval(() => apiCall(`get_sync=true&key=${USER.key}`), 8000);
    }

    function focusModule(type) {
        const layer = document.getElementById('focus-layer');
        const body = document.getElementById('focus-body');
        layer.classList.add('active');
        if(type === 'VAULT') {
            body.innerHTML = `<div style="text-align:center;"><div class="av-circle" style="width:100px; height:100px; margin:auto; background-image:url('${USER.av}')" onclick="document.getElementById('av-up').click()"></div><textarea id="b-in" class="in" style="height:100px;">${USER.bio}</textarea><button class="btn" onclick="saveVault()">SAVE</button><input type="file" id="av-up" style="display:none" onchange="procAv(this)"></div>`;
        }
    }

    function exitFocus() { document.getElementById('focus-layer').classList.remove('active'); }

    function procAv(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas'); cvs.width=128; cvs.height=128;
                cvs.getContext('2d').drawImage(img, 0, 0, 128, 128);
                USER.av = cvs.toDataURL("image/jpeg", 0.5);
                saveVault();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function saveVault() {
        const b = document.getElementById('b-in') ? document.getElementById('b-in').value : USER.bio;
        apiCall(`key=${USER.key}&update_id=true&bio=${encodeURIComponent(b)}&av=${encodeURIComponent(USER.av)}`);
        USER.bio = b; document.getElementById('my-bio').innerText = b;
        exitFocus();
    }

    function procLogo(input) {
        const reader = new FileReader();
        reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
                const cvs = document.createElement('canvas'); cvs.width=500; cvs.height=500;
                cvs.getContext('2d').drawImage(img, 0, 0, 500, 500);
                apiCall(`key=${USER.key}&update_logo=${encodeURIComponent(cvs.toDataURL("image/jpeg", 0.6))}`);
                setTimeout(() => location.reload(), 2000);
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(input.files[0]);
    }

    function updateArenaData(d) {
        document.getElementById('chat-pre').innerHTML = (d.chat || []).map(m => `<div><b>${m.user}:</b> ${m.text}</div>`).join('');
    }
</script>
</body>
</html>
