<body>
<div id="phoenix-layer"><div class="phoenix-aura"></div><h1 style="color:var(--warn);">RITUAL ACTIVE</h1><div id="countdown" style="font-size:40px;">10</div></div>
<div class="app-shell">
    <div id="auth-view" style="max-width:400px; margin:auto; text-align:center;">
        <h2 style="letter-spacing:5px;">RITUAL ENGINE</h2>
        <div id="gate-container">
            <button class="btn" onclick="showKeyInput()">CLAIM ACCESS NODE</button>
            <button class="btn btn-sub" onclick="showCredsInput()">INITIALIZE SESSION</button>
        </div>
        <div id="dynamic-inputs" style="display:none; margin-top:20px;"></div>
    </div>
    <div id="arena-view" style="display:none;">
        <div class="header">
            <div style="display:flex; align-items:center;">
                <div id="logo-box" style="width:40px; height:40px; border:1px solid var(--gold); margin-right:10px; background-size:cover; background-color:#111;"></div>
                <div><h2 id="disp-name" style="margin:0; font-size:16px;"></h2><small id="disp-game" style="color:#666;"></small></div>
            </div>
            <div id="role-tag" style="border:1px solid var(--gold); padding:2px 6px; font-size:10px;"></div>
        </div>
        <div class="grid">
            <div class="pane"><small>🏆 HALL OF FAME</small><div id="hof-box" class="display"></div><div id="admin-tools"></div></div>
            <div class="pane"><small>🔥 ARENA CHAT</small><div id="chat-box" class="display">Node Connected.</div><input type="text" id="chat-in" class="ritual-input" placeholder="Transmission..."><button class="btn" onclick="alert('MSG SENT')">EXECUTE</button></div>
        </div>
        <button class="btn btn-sub" style="margin-top:20px; opacity:0.3;" onclick="location.reload()">DISCONNECT</button>
    </div>
</div>
<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbwsp8s2i8DoiA3XH2TKeOwURYT12CtnLaSkvjrdAr7AfcWEwTiQqvkpDG-TQAvLF3Qu/exec";
    let CURRENT_KEY = "";

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('invite')) showEnrollmentScreen(urlParams.get('invite'));
    };

    function showKeyInput() {
        const div = document.getElementById('dynamic-inputs');
        document.getElementById('gate-container').style.display = 'none';
        div.style.display = 'block';
        div.innerHTML = `<h3>VERIFY NODE KEY</h3><input type="text" id="k-in" class="ritual-input" placeholder="ACCESS KEY"><button class="btn" onclick="validateKey()">VERIFY</button><p><a onclick="location.reload()" style="font-size:10px; color:#666; cursor:pointer;">BACK</a></p>`;
    }

    function showCredsInput() {
        const div = document.getElementById('dynamic-inputs');
        document.getElementById('gate-container').style.display = 'none';
        div.style.display = 'block';
        div.innerHTML = `<h3>SECURE LOGIN</h3><input type="text" id="u-in" class="ritual-input" placeholder="USERNAME"><input type="password" id="p-in" class="ritual-input" placeholder="PASSWORD"><button class="btn" onclick="loginWithCreds()">CONNECT</button><p><a onclick="location.reload()" style="font-size:10px; color:#666; cursor:pointer;">BACK</a></p>`;
    }

    function showEnrollmentScreen(role) {
        document.getElementById('gate-container').style.display = 'none';
        const div = document.getElementById('dynamic-inputs');
        div.style.display = 'block';
        div.innerHTML = `<h3>NODE ENROLLMENT</h3><p style="font-size:10px;">TARGET ROLE: ${role}</p><input type="email" id="e-in" class="ritual-input" placeholder="ENTER EMAIL"><button class="btn" onclick="triggerEmail('${role}')">REQUEST ACCESS KEY</button>`;
    }

    function triggerEmail(role) {
        const email = document.getElementById('e-in').value;
        if(!email) return alert("EMAIL REQUIRED");
        fetch(`${SCRIPT}?enroll_email=${encodeURIComponent(email)}&invite_role=${role}`).then(r => r.text()).then(res => {
            if(res === "EXISTS") alert("EMAIL ALREADY IN SYSTEM.");
            else { alert("KEY DISPATCHED TO INBOX."); location.href = location.origin + location.pathname; }
        });
    }

    function validateKey() {
        const key = document.getElementById('k-in').value;
        fetch(`${SCRIPT}?key=${key}`).then(r => r.json()).then(data => {
            if(data.status === "UNAUTHORIZED") return alert("INVALID KEY");
            CURRENT_KEY = key;
            if(data.status === "REQUIRE_LOGIN") { alert("NODE CLAIMED. USE LOGIN."); location.reload(); }
            else if(data.status === "STEP_BRANDING") showBrandingForm();
            else showAccountForm(data.role);
        });
    }

    function showBrandingForm() {
        const div = document.getElementById('dynamic-inputs');
        div.innerHTML = `<h3>IDENTITY SETUP</h3><input type="text" id="b-name" class="ritual-input" placeholder="ALLIANCE NAME"><input type="text" id="b-game" class="ritual-input" placeholder="ACTIVE GAME"><input type="text" id="b-tag" class="ritual-input" placeholder="TAG (e.g. TCA1)"><input type="text" id="b-logo" class="ritual-input" placeholder="LOGO URL"><button class="btn" onclick="saveBranding()">LOCK BRANDING</button>`;
    }

    function saveBranding() {
        const n = encodeURIComponent(document.getElementById('b-name').value);
        const g = encodeURIComponent(document.getElementById('b-game').value);
        const t = encodeURIComponent(document.getElementById('b-tag').value);
        const l = encodeURIComponent(document.getElementById('b-logo').value);
        fetch(`${SCRIPT}?key=${CURRENT_KEY}&name=${n}&game=${g}&tag=${t}&logo=${l}`).then(() => validateKey());
    }

    function showAccountForm(role) {
        const div = document.getElementById('dynamic-inputs');
        div.innerHTML = `<h3>ACTIVATE ${role} NODE</h3><input type="text" id="u-reg" class="ritual-input" placeholder="USERNAME"><input type="password" id="p-reg" class="ritual-input" placeholder="PASSWORD"><button class="btn" onclick="saveAccount()">INITIALIZE ACCOUNT</button>`;
    }

    function saveAccount() {
        const u = document.getElementById('u-reg').value;
        const p = document.getElementById('p-reg').value;
        fetch(`${SCRIPT}?key=${CURRENT_KEY}&username=${u}&password=${p}`).then(r => r.text()).then(res => {
            if(res === "TAKEN") return alert("USERNAME TAKEN");
            alert("ACCOUNT SECURED. LOG IN TO ENTER."); location.reload();
        });
    }

    function loginWithCreds() {
        const u = document.getElementById('u-in').value;
        const p = document.getElementById('p-in').value;
        fetch(`${SCRIPT}?user=${u}&pass=${p}`).then(r => r.json()).then(data => {
            if(data.status === "INVALID_CREDENTIALS") return alert("DENIED");
            window.USER = data;
            document.getElementById('auth-view').style.display = 'none';
            document.getElementById('arena-view').style.display = 'block';
            document.getElementById('disp-name').innerText = USER.name;
            document.getElementById('disp-game').innerText = `PROTOCOL: ${USER.game}`;
            document.getElementById('role-tag').innerText = USER.role;
            if(USER.logo) document.getElementById('logo-box').style.backgroundImage = `url('${USER.logo}')`;
            loadGist();
            const tools = document.getElementById('admin-tools');
            tools.innerHTML = `<button class="btn btn-sub" onclick="copyInvite('MEMBER')">INVITE MEMBER</button>`;
            if(USER.role === "OWNER") tools.innerHTML += `<button class="btn btn-sub" onclick="copyInvite('OFFICER')">INVITE OFFICER</button>`;
            if(USER.role === "OWNER" || USER.role === "OFFICER") tools.innerHTML += `<button class="btn btn-warn" onclick="startRitual()">START RITUAL</button>`;
        });
    }

    function copyInvite(role) {
        const link = `${window.location.origin}${window.location.pathname}?invite=${role}`;
        navigator.clipboard.writeText(link).then(() => alert(`${role} INVITE LINK COPIED`));
    }

    function loadGist() {
        fetch(`https://api.github.com/gists/${USER.gistId}`).then(r => r.json()).then(g => {
            const h = JSON.parse(g.files[USER.gistFile].content).history;
            document.getElementById('hof-box').innerHTML = h.reverse().map(i => `<div>[${i.date}] <b>${i.name}</b></div>`).join('');
        });
    }

    function startRitual() {
        document.getElementById('phoenix-layer').style.display = 'flex';
        let c = 10;
        let t = setInterval(() => {
            c--; document.getElementById('countdown').innerText = c;
            if(c<=0) {
                clearInterval(t); document.getElementById('phoenix-layer').style.display = 'none';
                const w = prompt("WINNER:");
                if(w) fetch(`${SCRIPT}?key=${USER.key}&log_winner=${encodeURIComponent(w)}`).then(() => { alert("LOGGED"); loadGist(); });
            }
        }, 1000);
    }
</script>
</body>
</html>
