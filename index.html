<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RITUAL | V33.57 COMMAND</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        :root { --gold: #d4af37; --fire: #ff6600; --bg: #000; --panel: #0a0a0a; --led-green: #00ff41; --led-red: #ff0000; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:'Courier New', monospace; height:100vh; overflow:hidden; }

        .deck-wrapper { display: flex; width: 400vw; height: 100vh; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        .deck-wrapper::-webkit-scrollbar { display: none; }
        .module-slide { width: 100vw; height: 100vh; scroll-snap-align: start; flex-shrink: 0; display: flex; flex-direction: column; padding: 25px; box-sizing: border-box; }
        .module-card { background: var(--panel); border: 3px solid #1a1a1a; border-radius: 15px; flex: 1; display: flex; flex-direction: column; padding: 25px; overflow-y: auto; box-shadow: 0 0 40px #000 inset; position: relative; }

        h2 { text-transform: uppercase; letter-spacing: 5px; font-size: 28px; text-align: center; margin-bottom: 25px; color: var(--gold); }
        .btn { width:100%; background:var(--gold); color:#000; border:none; padding:25px; font-weight:bold; cursor:pointer; text-transform:uppercase; margin-top: 15px; font-size: 18px; border-radius: 10px; }
        .in { width:100%; background:#111; color:#fff; border:2px solid #333; padding:25px; margin:10px 0; box-sizing:border-box; text-align:center; font-size: 20px; border-radius: 10px; }

        .led-indicator { position: fixed; bottom: 30px; left: 30px; display: flex; gap: 12px; z-index: 5000; pointer-events: none; }
        .led { width: 16px; height: 16px; border-radius: 50%; background: var(--led-green); box-shadow: 0 0 10px var(--led-green); transition: 0.3s; border: 1px solid rgba(255,255,255,0.1); }
        .led.active { background: var(--led-red) !important; box-shadow: 0 0 20px var(--led-red) !important; }

        #ritual-overlay { position: fixed; width: 100vw; height: 100vh; background:#000; z-index: 9999; display: none; flex-direction: column; justify-content: center; align-items: center; border: 4px solid var(--fire); }
        
        @media (orientation: portrait) {
            #slide-hof .module-card { width: 100vh; height: 100vw; transform: rotate(90deg); transform-origin: center center; position: fixed; top: 50%; left: 50%; translate: -50% -50%; }
        }
    </style>
</head>
<body>

    <div id="auth-view" style="position:fixed; width:100%; height:100%; z-index:9000; background:#000; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;">
        <h1 style="font-size: 60px; color: var(--gold); letter-spacing: 15px; margin-bottom: 40px;">RITUAL</h1>
        <div id="auth-form" style="width: 90%; max-width: 450px;">
            <input id="u" class="in" placeholder="IDENTITY" autocapitalize="none">
            <input id="p" class="in" type="password" placeholder="PASSKEY">
            <button class="btn" onclick="login()">INITIALIZE ARENA</button>
            <p id="hud" style="color:#444; margin-top:20px;">[ SYSTEM STANDBY ]</p>
        </div>
    </div>

    <div id="arena-view" style="display:none;">
        <div class="deck-wrapper" id="main-deck">
            <div class="module-slide"><h2>Arena Chat</h2><div class="module-card" id="chat-content">ESTABLISHING LINK...</div></div>
            <div class="module-slide"><h2>Hall of Fame</h2><div class="module-card" id="hof-content">SYNCING RECORDS...</div></div>
            <div class="module-slide"><h2>Alliance</h2><div class="module-card" id="profile-list">SYNCING NODES...</div></div>
            <div class="module-slide" id="slide-cmd">
                <h2>Command</h2>
                <div class="module-card" style="text-align:center;">
                    <div id="my-name" style="font-size: 28px; margin-bottom: 20px;">COMMANDER</div>
                    <button class="btn" onclick="location.reload()" style="background:#111; color:#333; margin-top:50px;">DISCONNECT</button>
                </div>
            </div>
        </div>
        <div class="led-indicator"><div class="led"></div><div class="led"></div><div class="led"></div><div class="led"></div></div>
    </div>

<script>
    const SCRIPT = "https://script.google.com/macros/s/AKfycbz7uCQhdlFdcqdpW61N5btZ-fQrurxBBS6E3wAb7SDus0bGWQQ_alGPVDcuPGji5Dh2/exec";
    let USER = null;

    async function login() {
        const u = document.getElementById('u').value;
        const p = document.getElementById('p').value;
        if(!u || !p) return;
        document.getElementById('hud').innerText = "[ INITIALIZING... ]";
        
        try {
            const resp = await fetch(`${SCRIPT}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`, { redirect: 'follow' });
            const d = await resp.json();

            if(d.status === "AUTHORIZED") {
                USER = d;
                document.getElementById('auth-view').style.display = 'none';
                document.getElementById('arena-view').style.display = 'block';
                
                setTimeout(() => {
                    const deck = document.getElementById('main-deck');
                    deck.scrollLeft = (USER.role === "MEMBER") ? 0 : (window.innerWidth * 3);
                    document.getElementById('my-name').innerText = USER.user.toUpperCase();
                    updateLEDs();
                }, 600);

                setInterval(async () => {
                    try {
                        const syncResp = await fetch(`${SCRIPT}?get_sync=true&key=${USER.key}`, { redirect: 'follow' });
                        const sync = await syncResp.json();
                        if(sync.status === "SYNC_OK") updateData(sync);
                    } catch(e) {}
                }, 8000);
                
                document.getElementById('main-deck').onscroll = updateLEDs;
            } else {
                document.getElementById('hud').innerText = "[ REJECTED ]";
            }
        } catch(e) { document.getElementById('hud').innerText = "[ CONNECTION ERROR ]"; }
    }

    function updateLEDs() {
        const deck = document.getElementById('main-deck');
        const index = Math.round(deck.scrollLeft / window.innerWidth);
        document.querySelectorAll('.led').forEach((l, i) => l.className = i === index ? 'led active' : 'led');
    }

    function updateData(d) {
        if(d.history) document.getElementById('hof-content').innerHTML = d.history.map(h => `<div style="padding:10px; border-bottom:1px solid #222;">[${h.date}] <b>${h.name}</b></div>`).join('');
    }
</script>
</body>
</html>
