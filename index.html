<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RITUAL ENGINE | V19.0 CORE</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --panel: #0a0a0a; --warn: #ff4444; }
        body, html { margin:0; padding:0; background:#000; color:var(--gold); font-family:monospace; min-height:100vh; }
        .app-shell { padding:20px; text-align:center; }
        .btn { width:100%; max-width:300px; background:var(--gold); color:#000; border:none; padding:15px; font-weight:bold; cursor:pointer; margin-bottom:10px; }
        .ritual-input { width:100%; max-width:280px; background:#111; color:#fff; border:1px solid #333; padding:15px; margin:8px 0; }
        .display { height:300px; background:#000; border:1px solid #222; overflow-y:auto; text-align:left; padding:10px; color:#fff; font-size:12px; }
        #arena-view { display:none; }
    </style>
    <script>
        const SCRIPT = "https://script.google.com/macros/s/AKfycbxjcRYytKaTjRwixtYkce-_wZin97vE_k7eLXrV5a_GbTl7AcUBd-NFtpDfNSgrkkuD/exec";
        let USER = null;

        function showCredsInput() {
            document.getElementById('gate-container').innerHTML = `
                <h3>INITIALIZE SESSION</h3>
                <input type="text" id="u-in" class="ritual-input" placeholder="USERNAME">
                <input type="password" id="p-in" class="ritual-input" placeholder="PASSWORD">
                <button class="btn" onclick="login()">CONNECT</button>
            `;
        }

        function login() {
            const u = document.getElementById('u-in').value;
            const p = document.getElementById('p-in').value;
            // FIXED: Using "no-cors" fallback logic
            fetch(`${SCRIPT}?user=${encodeURIComponent(u)}&pass=${encodeURIComponent(p)}`)
                .then(r => r.json())
                .then(data => {
                    if(data.status === "AUTHORIZED") {
                        USER = data;
                        document.getElementById('auth-view').style.display = 'none';
                        document.getElementById('arena-view').style.display = 'block';
                        document.getElementById('disp-name').innerText = USER.name;
                        startSync();
                    } else { alert("DENIED"); }
                });
        }

        function startSync() {
            setInterval(() => {
                fetch(`${SCRIPT}?get_gist=true&key=${USER.key}`)
                .then(r => r.json())
                .then(g => {
                    const c = g.chat || [];
                    document.getElementById('chat-box').innerHTML = c.map(m => `<div>${m.user}: ${m.text}</div>`).join('');
                });
            }, 5000);
        }

        function sendChat() {
            const msg = document.getElementById('chat-in').value;
            fetch(`${SCRIPT}?key=${USER.key}&chat_msg=${encodeURIComponent(msg)}`).then(() => {
                document.getElementById('chat-in').value = '';
            });
        }
    </script>
</head>
<body>
    <div class="app-shell">
        <div id="auth-view">
            <h2>RITUAL ENGINE</h2>
            <div id="gate-container">
                <button class="btn" onclick="showCredsInput()">INITIALIZE SESSION</button>
            </div>
        </div>

        <div id="arena-view">
            <h2 id="disp-name"></h2>
            <div id="chat-box" class="display">Connecting...</div>
            <input type="text" id="chat-in" class="ritual-input" placeholder="Message...">
            <button class="btn" onclick="sendChat()">SEND</button>
        </div>
    </div>
</body>
</html>
